<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog preview card</title>
    <!-- Style File -->
    <link rel="stylesheet" href="style.css" />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,500;0,800;1,500;1,800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container">
      <article class="blog-card">
        <figure class="card-banner">
          <img src="illustration-article.svg" alt="Blog post illustration" />
        </figure>
        <span class="category">Learning</span>
        <p class="publish-date">Published 21 Dec 2023</p>

        <h2>HTML & CSS foundations</h2>
        <p class="description">
          These languages are the backbone of every website. defining structure,
          content, and presentation.
        </p>

        <figure class="author">
          <img src="image-avatar.webp" alt="Greg Hooper" />
          <figcaption>Greg Hooper</figcaption>
        </figure>
      </article>
    </main>
  </body>
</html>
